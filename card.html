<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="FutureShield — Digital Visiting Card" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Digital Visiting Card – FutureShield</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/css/tailwind.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --card-black: #0a0a0a;
      --card-black-soft: #141414;
      --card-navy: #0a0a0a;
      --card-navy-light: #1a1a1a;
      --card-gold: #d4b86a;
    }
    body { font-family: 'Inter', sans-serif; background: #e8ecf1; }
    .card-shell {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    .card-frame {
      background: #fff;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.18);
    }
    /* ── Hero header: full-bleed banner + overlapping photo ── */
    .card-hero {
      position: relative;
      min-height: clamp(9.5rem, 36vw, 12.5rem);
      padding-bottom: clamp(3.75rem, 14vw, 4.5rem);
      overflow: visible;
      background: #1e293b;
    }
    .hero-banner-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }
    .hero-banner-fallback {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1e3a5f 100%);
    }
    .hero-banner-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.18) 100%);
      pointer-events: none;
    }
    .hero-photo-wrap {
      position: absolute;
      right: clamp(1rem, 4vw, 1.5rem);
      bottom: clamp(-2.75rem, -11vw, -3.25rem);
      width: clamp(5.25rem, 21vw, 6.5rem);
      height: clamp(5.25rem, 21vw, 6.5rem);
      z-index: 20;
    }
    .hero-photo,
    .hero-photo-fallback {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ffffff;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
    }
    .hero-photo-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #2d2d2d, #0a0a0a);
      color: #ffffff;
      font-size: clamp(1.5rem, 6vw, 2rem);
      font-weight: 700;
    }
    /* ── White content area ── */
    .card-white {
      background: #ffffff;
      position: relative;
      z-index: 10;
    }
    .profile-intro {
      padding: clamp(1rem, 4vw, 1.375rem) clamp(1rem, 4vw, 1.5rem) 0.75rem;
      padding-right: calc(clamp(5.25rem, 21vw, 6.5rem) + clamp(1.25rem, 5vw, 1.75rem));
      min-height: clamp(3.5rem, 14vw, 4.25rem);
    }
    .profile-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.375rem, 5.5vw, 1.75rem);
      font-weight: 700;
      color: #0a0a0a;
      line-height: 1.15;
      letter-spacing: 0.01em;
      margin: 0;
    }
    .profile-designation {
      font-size: clamp(0.875rem, 3.5vw, 1rem);
      font-weight: 600;
      color: #4338ca;
      line-height: 1.35;
      margin-top: 0.375rem;
    }
    .profile-branch {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #6b7280;
      margin-top: 0.25rem;
    }
    /* ── Bio strip ── */
    .bio-strip {
      background: #ffffff;
      padding: 0 clamp(1rem, 4vw, 1.5rem) 1rem;
      padding-right: calc(clamp(5.25rem, 21vw, 6.5rem) + clamp(1.25rem, 5vw, 1.75rem));
    }
    .bio-strip p {
      font-size: 0.875rem;
      color: #374151;
      line-height: 1.55;
      font-style: italic;
    }
    /* ── Contact body ── */
    .card-body { padding: 0.75rem 1.125rem 1.5rem; }
    .contact-list { display: flex; flex-direction: column; gap: 1rem; }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      text-decoration: none;
      color: inherit;
    }
    .contact-row:hover .contact-value { color: #4f46e5; }
    .contact-icon {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      background: var(--card-navy);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .contact-icon svg { width: 1.125rem; height: 1.125rem; color: var(--card-gold); }
    .contact-icon-wa { background: #128C7E; }
    .contact-icon-wa svg { color: #fff; }
    .contact-value {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #111827;
      transition: color 0.15s;
      word-break: break-all;
    }
    .contact-label {
      display: block;
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 0.125rem;
    }
    /* ── Social ── */
    .social-section {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid #f3f4f6;
    }
    .social-label {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9ca3af;
      text-align: center;
      margin-bottom: 0.875rem;
    }
    .social-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.625rem;
    }
    .social-btn {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      background: var(--card-navy);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
      text-decoration: none;
    }
    .social-btn:hover { background: var(--card-navy-light); transform: scale(1.06); }
    .social-btn:active { transform: scale(0.96); }
    .social-btn svg { width: 1.125rem; height: 1.125rem; color: var(--card-gold); }
    .social-btn-wa { background: #25D366; }
    .social-btn-wa svg { color: #fff; }
    .social-btn-wa:hover { background: #1da851; }
    /* ── Add to contacts ── */
    .btn-add-contact {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: var(--card-navy);
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      box-shadow: 0 4px 14px rgba(12, 21, 39, 0.25);
    }
    .btn-add-contact:hover { background: var(--card-navy-light); }
    .btn-add-contact:active { transform: scale(0.98); }
    /* ── Products ── */
    .products-section { padding: 0 1rem 2rem; }
    .product-card {
      background: #fff;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
      border: 1px solid #e2e8f0;
    }
    .inquiry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      width: 100%;
      padding: 0.65rem 1rem;
      background: #25D366;
      color: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      border-radius: 0.625rem;
      transition: background 0.15s;
      text-decoration: none;
    }
    .inquiry-btn:hover { background: #1da851; }
    /* ── Error / loading ── */
    .error-header-mini {
      background: #1e293b;
      padding: 0;
      text-align: center;
      min-height: 4rem;
      position: relative;
      overflow: hidden;
    }
    .error-header-mini .hero-banner-bg,
    .error-header-mini .hero-banner-fallback {
      position: absolute;
      inset: 0;
    }
    .skeleton { animation: pulse 1.5s ease-in-out infinite; background: #e2e8f0; border-radius: 0.5rem; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .error-panel { flex: 1; padding: 1rem 1rem 2rem; }
    .error-icon-amber { background: #fffbeb; color: #d97706; }
    .error-icon-blue  { background: #eff6ff; color: #2563eb; }
    .error-icon-slate { background: #f1f5f9; color: #64748b; }
    .error-icon-red   { background: #fef2f2; color: #dc2626; }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%; padding: 0.875rem 1.25rem; border-radius: 0.875rem;
      font-size: 0.875rem; font-weight: 600; transition: background 0.15s, transform 0.15s;
      border: none; cursor: pointer; text-decoration: none;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-indigo { background: #4f46e5; color: #fff; }
    .btn-indigo:hover { background: #4338ca; }
    .btn-outline { background: #fff; color: #475569; border: 1px solid #e2e8f0; }
    .btn-outline:hover { background: #f8fafc; }
  </style>
</head>
<body>

  <div id="app" class="card-shell">

    <header id="card-header" class="error-header-mini hidden" aria-label="Company">
      <div id="err-banner-bg" class="hero-banner-bg hidden"></div>
      <div id="err-banner-fallback" class="hero-banner-fallback"></div>
    </header>

    <div id="state-loading" class="px-5 pt-16 text-center flex-1">
      <div class="skeleton w-20 h-20 rounded-full mx-auto mb-4"></div>
      <div class="skeleton h-4 w-40 mx-auto mb-2"></div>
      <p class="text-slate-400 text-sm mt-6">Loading visiting card…</p>
    </div>

    <div id="state-error" class="hidden error-panel">
      <div class="card-frame rounded-2xl px-5 py-8 sm:px-7 sm:py-9 text-center max-w-md mx-auto">
        <div id="error-icon-wrap"
          class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-5 error-icon-amber">
          <svg id="error-icon-svg" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 id="error-title" class="text-xl font-bold text-slate-800 mb-2 leading-snug">Visiting Card Unavailable</h1>
        <p id="error-message" class="text-sm text-slate-500 leading-relaxed max-w-sm mx-auto"></p>
        <ul id="error-steps" class="hidden text-left text-sm text-slate-600 mt-5 space-y-2.5 bg-slate-50 rounded-xl px-4 py-4 border border-slate-100"></ul>
        <div id="error-actions" class="mt-7 space-y-3">
          <button type="button" id="btn-request-access" class="btn-primary btn-indigo hidden">Request Access from Administrator</button>
          <button type="button" id="btn-copy-request" class="btn-primary btn-outline hidden">Copy Request Message</button>
          <a id="btn-go-dashboard" href="index.html" class="btn-primary btn-outline hidden">Open Admin Dashboard</a>
        </div>
        <p id="error-footer-hint" class="text-xs text-slate-400 mt-6 leading-relaxed hidden"></p>
      </div>
      <footer class="text-center mt-8 px-4 pb-6">
        <p class="text-xs text-slate-400">Powered by <span id="error-footer-co-name" class="font-semibold text-slate-500">FutureShield</span></p>
      </footer>
    </div>

    <div id="state-card" class="hidden flex-1 pb-6">
      <article class="card-frame">
        <!-- Dynamic header banner + overlapping photo -->
        <header class="card-hero">
          <div id="hero-banner-bg" class="hero-banner-bg hidden"></div>
          <div id="hero-banner-fallback" class="hero-banner-fallback"></div>
          <div class="hero-banner-overlay" aria-hidden="true"></div>
          <div class="hero-photo-wrap">
            <img id="adv-photo" alt="Profile photo" class="hero-photo hidden" decoding="async" />
            <div id="adv-photo-fallback" class="hero-photo-fallback">A</div>
          </div>
        </header>

        <!-- White section: name, bio, contacts -->
        <div class="card-white">
          <div class="profile-intro">
            <h1 id="adv-name" class="profile-name">Name</h1>
            <p id="adv-designation" class="profile-designation">Designation</p>
            <p id="adv-branch" class="profile-branch hidden"></p>
          </div>

          <div id="adv-bio-strip" class="bio-strip hidden">
            <p id="adv-bio"></p>
          </div>

          <div class="card-body">
          <div class="contact-list">
            <a id="row-phone" href="#" class="contact-row hidden">
              <div class="contact-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              </div>
              <div>
                <span id="contact-phone" class="contact-value"></span>
                <span class="contact-label">Mobile</span>
              </div>
            </a>
            <a id="row-email" href="#" class="contact-row hidden">
              <div class="contact-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              </div>
              <div>
                <span id="contact-email" class="contact-value"></span>
                <span class="contact-label">Email</span>
              </div>
            </a>
            <a id="row-whatsapp" href="#" target="_blank" rel="noopener" class="contact-row hidden">
              <div class="contact-icon contact-icon-wa">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              </div>
              <div>
                <span id="contact-whatsapp" class="contact-value">WhatsApp</span>
                <span class="contact-label">Message on WhatsApp</span>
              </div>
            </a>
          </div>

          <div id="social-section" class="social-section hidden">
            <p class="social-label">Connect With Us</p>
            <div id="social-row" class="social-row"></div>
          </div>

          <button type="button" id="btn-add-contact" class="btn-add-contact">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
            Add to Contacts
          </button>
          </div>
        </div><!-- /.card-white -->
      </article>

      <section id="products-section" class="products-section mt-6 hidden">
        <div class="flex items-center justify-between mb-4 px-1">
          <h3 class="text-base font-bold text-slate-800">Our Products</h3>
          <span id="product-count" class="text-xs font-medium text-slate-400"></span>
        </div>
        <div id="products-grid" class="space-y-4"></div>
      </section>

      <footer class="text-center mt-6 px-4">
        <p class="text-xs text-slate-400">Powered by <span id="footer-co-name" class="font-semibold text-slate-500">FutureShield</span></p>
      </footer>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, doc, getDoc, collection, getDocs, query, where, orderBy, limit,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyCc7jc0aQk7_zh-CQx6g4It_yeKhj1P1U0",
      authDomain:        "future-shield.firebaseapp.com",
      projectId:         "future-shield",
      storageBucket:     "future-shield.firebasestorage.app",
      messagingSenderId: "264506715869",
      appId:             "1:264506715969:web:e2edaf0134d269cbb3bbc0",
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const params   = new URLSearchParams(location.search);
    const cardType = (params.get("type") || "advisor").toLowerCase();
    const entityId = params.get("id");
    const slug     = params.get("slug");

    const $ = id => document.getElementById(id);

    let _companyName = "FutureShield";
    let _companyData = {};
    let _cardEntity  = null;
    let _cardType    = "advisor";
    let _requestMessage = "";

    function esc(s) {
      if (s == null) return "";
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function showState(name) {
      ["state-loading", "state-error", "state-card"].forEach(id => {
        $(id).classList.toggle("hidden", id !== "state-" + name);
      });
      const errHeader = $("card-header");
      if (errHeader) errHeader.classList.toggle("hidden", name === "loading" || name === "card");
    }

    function normalizePhone(raw) {
      const digits = String(raw || "").replace(/\D/g, "");
      if (digits.length === 10) return "91" + digits;
      if (digits.length === 12 && digits.startsWith("91")) return digits;
      if (digits.length === 11 && digits.startsWith("0")) return "91" + digits.slice(1);
      return digits;
    }

    function formatPhoneDisplay(raw) {
      const d = String(raw || "").replace(/\D/g, "");
      if (d.length === 10) return "+91 " + d.slice(0, 5) + " " + d.slice(5);
      if (d.length === 12 && d.startsWith("91")) return "+" + d.slice(0, 2) + " " + d.slice(2, 7) + " " + d.slice(7);
      return raw || "";
    }

    function waLink(phone, text) {
      return "https://wa.me/" + normalizePhone(phone) + "?text=" + encodeURIComponent(text);
    }

    function normalizeLogoSrc(logo) {
      if (!logo || typeof logo !== "string") return "";
      const trimmed = logo.trim();
      if (!trimmed) return "";
      if (trimmed.startsWith("data:") || trimmed.startsWith("http://") || trimmed.startsWith("https://")) return trimmed;
      if (/^[A-Za-z0-9+/=\s]+$/.test(trimmed.slice(0, 32))) return "data:image/png;base64," + trimmed.replace(/\s/g, "");
      return trimmed;
    }

    function applyHeaderBanner(data) {
      const bannerSrc = normalizeLogoSrc(data?.cardHeaderBannerBase64);
      const logoFallback = normalizeLogoSrc(data?.logoBase64);
      const src = bannerSrc || logoFallback;

      function setBanner(bgEl, fbEl) {
        if (!bgEl || !fbEl) return;
        if (src) {
          bgEl.style.backgroundImage = 'url("' + src.replace(/"/g, "%22") + '")';
          bgEl.classList.remove("hidden");
          fbEl.classList.add("hidden");
        } else {
          bgEl.style.backgroundImage = "";
          bgEl.classList.add("hidden");
          fbEl.classList.remove("hidden");
        }
      }

      setBanner($("hero-banner-bg"), $("hero-banner-fallback"));
      setBanner($("err-banner-bg"), $("err-banner-fallback"));
    }

    function renderCompanyBranding(data) {
      _companyData = data || {};
      const name = data.companyName || "FutureShield";
      _companyName = name;

      $("footer-co-name").textContent = name;
      $("error-footer-co-name").textContent = name;
      document.title = "Digital Card – " + name;

      applyHeaderBanner(data);
    }

    async function loadCompanySettings() {
      try {
        const coSnap = await getDoc(doc(db, "company_settings", "main"));
        if (coSnap.exists()) renderCompanyBranding(coSnap.data());
      } catch (err) {
        console.warn("Could not load company branding:", err);
      }
    }

    const SOCIAL_PLATFORMS = [

      { key: "cardSocialLinkedin",  label: "LinkedIn",  svg: `<svg fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>` },
      { key: "cardSocialTwitter",   label: "X / Twitter", svg: `<svg fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>` },
      { key: "cardSocialYoutube",   label: "YouTube",   svg: `<svg fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>` },
    ];

    function normalizeSocialUrl(url, platform) {
      if (!url) return "";
      let u = url.trim();
      if (!u) return "";
      if (!/^https?:\/\//i.test(u)) u = "https://" + u;
      return u;
    }

    function renderSocialLinks(data) {
      const section = $("social-section");
      const row = $("social-row");
      if (!section || !row) return;

      const links = SOCIAL_PLATFORMS
        .map(p => ({ ...p, url: normalizeSocialUrl(data[p.key], p.key) }))
        .filter(p => p.url);

      if (!links.length) {
        section.classList.add("hidden");
        row.innerHTML = "";
        return;
      }

      row.innerHTML = links.map(p =>
        `<a href="${esc(p.url)}" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="${esc(p.label)}" title="${esc(p.label)}">${p.svg}</a>`
      ).join("");
      section.classList.remove("hidden");
    }

    function buildVCard(entity, type) {
      const phone = entity.whatsappNumber || entity.mobile || "";
      const role = entity.designation || (type === "manager" ? "Manager" : "Insurance Advisor");
      const escV = s => String(s || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
      return [
        "BEGIN:VCARD", "VERSION:3.0",
        "FN:" + escV(entity.name),
        "ORG:" + escV(_companyName),
        role ? "TITLE:" + escV(role) : "",
        phone ? "TEL;TYPE=CELL:" + phone.replace(/\D/g, "") : "",
        entity.email ? "EMAIL:" + escV(entity.email) : "",
        entity.cardBranch ? "NOTE:" + escV(entity.cardBranch) : "",
        "END:VCARD",
      ].filter(Boolean).join("\r\n");
    }

    function downloadVCard() {
      if (!_cardEntity) return;
      const vcard = buildVCard(_cardEntity, _cardType);
      const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = (String(_cardEntity.name || "contact").replace(/\s+/g, "_").toLowerCase()) + ".vcf";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
    }

    async function managerFeatureEnabled(managerId) {
      if (!managerId) return true;
      try {
        const snap = await getDoc(doc(db, "managers", managerId));
        if (!snap.exists()) return false;
        const d = snap.data();
        if (d.disabled === true) return false;
        return d.digitalCardEnabled === true || d.feature_enabled === true;
      } catch (err) {
        console.warn("Could not verify manager digital card access:", err);
        return false;
      }
    }

    async function loadBySlug(slugVal) {
      const slugNorm = slugVal.toLowerCase().trim();
      for (const type of ["advisor", "manager"]) {
        const coll = type === "manager" ? "managers" : "advisors";
        const q = query(collection(db, coll), where("cardSlug", "==", slugNorm), limit(1));
        const snap = await getDocs(q);
        if (!snap.empty) {
          const d = snap.docs[0];
          return { type, entity: { id: d.id, ...d.data() } };
        }
      }
      return null;
    }

    async function loadCardEntity() {
      if (entityId) {
        const coll = cardType === "manager" ? "managers" : "advisors";
        const snap = await getDoc(doc(db, coll, entityId));
        if (!snap.exists()) return null;
        return { type: cardType, entity: { id: snap.id, ...snap.data() } };
      }
      if (slug) return loadBySlug(slug);
      return null;
    }

    async function verifyCardAccess(type, entity) {
      if (entity.disabled === true) return { ok: false, reason: "disabled" };
      if (entity.cardEnabled !== true) return { ok: false, reason: "unpublished" };
      if (type === "manager") {
        if (!(entity.digitalCardEnabled === true || entity.feature_enabled === true)) {
          return { ok: false, reason: "feature_off" };
        }
        return { ok: true };
      }
      if (entity.managerId && !(await managerFeatureEnabled(entity.managerId))) {
        return { ok: false, reason: "feature_off" };
      }
      return { ok: true };
    }

    async function loadProducts(type, id) {
      const collName = type === "manager" ? "managers" : "advisors";
      try {
        const q = query(collection(db, collName, id, "card_products"), orderBy("sortOrder", "asc"));
        const snap = await getDocs(q);
        return snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.active !== false);
      } catch {
        const snap = await getDocs(collection(db, collName, id, "card_products"));
        return snap.docs.map(d => ({ id: d.id, ...d.data() }))
          .filter(p => p.active !== false)
          .sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
      }
    }

    const ERROR_CONFIG = {
      feature_off: {
        title: "Digital Cards Not Active for This Team",
        message: "The digital visiting card feature has not been enabled for your team yet. An administrator must turn it on before this card can be viewed publicly.",
        steps: ["Contact your administrator and request Digital Card access.", "Once enabled, configure and save your card from the dashboard.", "Return to this link to view your live visiting card."],
        tone: "amber", requestAccess: true, showDashboard: true, icon: "lock",
      },
      unpublished: {
        title: "This Card Is Not Published Yet",
        message: "This profile exists but the visiting card has not been published. Enable it from the Digital Cards dashboard.",
        steps: ["Sign in to the dashboard.", "Check Enable public digital card.", "Click Save Card and reopen this link."],
        tone: "blue", requestAccess: false, showDashboard: true, icon: "doc",
      },
      disabled: { title: "Profile Inactive", message: "This account has been disabled.", steps: [], tone: "slate", requestAccess: false, showDashboard: false, icon: "user" },
      notfound: { title: "Card Not Found", message: "No card matches this link.", steps: ["Check the URL.", "Ask for a fresh link from Digital Cards."], tone: "slate", requestAccess: false, showDashboard: false, icon: "search" },
      missing: { title: "No Card Specified", message: "Add ?slug=your-name or ?id=… to the URL.", steps: [], tone: "slate", requestAccess: false, showDashboard: false, icon: "link" },
      permission: { title: "Unable to Load", message: "Permission denied. Try again later.", steps: [], tone: "red", requestAccess: false, showDashboard: false, icon: "alert" },
      generic: { title: "Unavailable", message: "Something went wrong. Please try again.", steps: [], tone: "red", requestAccess: false, showDashboard: false, icon: "alert" },
    };

    const ERROR_ICONS = {
      lock: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>`,
      doc: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>`,
      user: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>`,
      search: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>`,
      link: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>`,
      alert: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>`,
    };

    function buildRequestMessage(entity, type, reason) {
      const person = entity?.name || "Team member";
      const role = type === "manager" ? "Manager" : "Advisor";
      if (reason === "feature_off") {
        return `Hello Administrator,\n\nI would like to request Digital Visiting Card access.\n\nName: ${person}\nRole: ${role}\nLink: ${location.href}\n\nThank you.`;
      }
      return `Hello,\n\nI'm trying to access a digital visiting card but it is not available yet.\n\nLink: ${location.href}\n\nThank you.`;
    }

    function showErrorState(reason, entity, type) {
      const cfg = ERROR_CONFIG[reason] || ERROR_CONFIG.generic;
      $("error-title").textContent = cfg.title;
      $("error-message").textContent = cfg.message;
      $("error-icon-wrap").className = "w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-5 error-icon-" + cfg.tone;
      const iconSvg = $("error-icon-svg");
      if (iconSvg && ERROR_ICONS[cfg.icon]) iconSvg.innerHTML = ERROR_ICONS[cfg.icon];

      const stepsEl = $("error-steps");
      if (cfg.steps?.length) {
        stepsEl.innerHTML = cfg.steps.map(s => `<li class="flex gap-2"><span class="text-indigo-500 font-bold">•</span><span>${esc(s)}</span></li>`).join("");
        stepsEl.classList.remove("hidden");
      } else {
        stepsEl.classList.add("hidden");
      }

      _requestMessage = buildRequestMessage(entity, type, reason);
      $("btn-request-access").classList.toggle("hidden", !cfg.requestAccess);
      $("btn-copy-request").classList.toggle("hidden", !cfg.requestAccess);
      $("btn-go-dashboard").classList.toggle("hidden", !cfg.showDashboard);

      if (cfg.requestAccess) {
        $("btn-request-access").onclick = () => {
          window.location.href = `mailto:?subject=${encodeURIComponent("Digital Card Access — " + _companyName)}&body=${encodeURIComponent(_requestMessage)}`;
        };
        $("btn-copy-request").onclick = async () => {
          try {
            await navigator.clipboard.writeText(_requestMessage);
            $("btn-copy-request").textContent = "Copied!";
            setTimeout(() => { $("btn-copy-request").textContent = "Copy Request Message"; }, 2500);
          } catch { window.prompt("Copy:", _requestMessage); }
        };
      }

      const hint = $("error-footer-hint");
      if (reason === "feature_off") {
        hint.textContent = "Administrators can enable this from Manage Managers → Digital Card toggle.";
        hint.classList.remove("hidden");
      } else hint.classList.add("hidden");

      showState("error");
    }

    function renderProfile(entity, type) {
      _cardEntity = entity;
      _cardType = type;

      const phone = entity.whatsappNumber || entity.mobile || "";
      const initial = (entity.name || "A").charAt(0).toUpperCase();
      const defaultRole = type === "manager" ? "Manager" : "Insurance Advisor";

      $("adv-name").textContent = entity.name || "Profile";
      $("adv-designation").textContent = entity.designation || defaultRole;

      const branchEl = $("adv-branch");
      if (entity.cardBranch) {
        branchEl.textContent = entity.cardBranch;
        branchEl.classList.remove("hidden");
      } else {
        branchEl.classList.add("hidden");
      }

      const photo = $("adv-photo");
      const photoFb = $("adv-photo-fallback");
      photoFb.textContent = initial;
      if (entity.photoBase64) {
        photo.onerror = () => { photo.classList.add("hidden"); photoFb.classList.remove("hidden"); };
        photo.onload = () => { photo.classList.remove("hidden"); photoFb.classList.add("hidden"); };
        photo.src = normalizeLogoSrc(entity.photoBase64) || entity.photoBase64;
        if (photo.complete && photo.naturalWidth > 0) {
          photo.classList.remove("hidden");
          photoFb.classList.add("hidden");
        }
      } else {
        photo.classList.add("hidden");
        photoFb.classList.remove("hidden");
      }

      const bioStrip = $("adv-bio-strip");
      const bioEl = $("adv-bio");
      if (entity.cardBio) {
        bioEl.textContent = entity.cardBio;
        bioStrip.classList.remove("hidden");
      } else {
        bioStrip.classList.add("hidden");
      }

      const phoneRow = $("row-phone");
      if (phone) {
        $("contact-phone").textContent = formatPhoneDisplay(phone);
        phoneRow.href = "tel:+" + normalizePhone(phone);
        phoneRow.classList.remove("hidden");
      } else phoneRow.classList.add("hidden");

      const emailRow = $("row-email");
      if (entity.email) {
        $("contact-email").textContent = entity.email;
        emailRow.href = "mailto:" + entity.email;
        emailRow.classList.remove("hidden");
      } else emailRow.classList.add("hidden");

      const waRow = $("row-whatsapp");
      if (phone) {
        $("contact-whatsapp").textContent = formatPhoneDisplay(phone);
        waRow.href = waLink(phone, "Hi, I came across your digital visiting card. I'd like to connect with you.");
        waRow.classList.remove("hidden");
      } else waRow.classList.add("hidden");

      $("btn-add-contact").onclick = downloadVCard;
      renderSocialLinks(_companyData);

      return phone;
    }

    function renderProducts(products, phone) {
      const section = $("products-section");
      const grid = $("products-grid");
      if (!section || !grid) return;

      if (!products.length) {
        section.classList.add("hidden");
        grid.innerHTML = "";
        return;
      }

      section.classList.remove("hidden");
      $("product-count").textContent = products.length + " item" + (products.length > 1 ? "s" : "");
      grid.innerHTML = products.map(p => {
        const img = p.imageBase64
          ? `<img src="${esc(p.imageBase64)}" alt="${esc(p.name)}" class="w-full h-40 object-cover" loading="lazy" />`
          : `<div class="w-full h-40 bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center"><svg class="w-12 h-12 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/></svg></div>`;
        const msg = "Hi, I am interested in " + p.name + ". Could you please share more details?";
        return `<article class="product-card">${img}<div class="p-4"><h4 class="font-semibold text-slate-800 text-base">${esc(p.name)}</h4>${p.description ? `<p class="text-sm text-slate-500 mt-1.5">${esc(p.description)}</p>` : ""}<a href="${esc(waLink(phone, msg))}" target="_blank" rel="noopener" class="inquiry-btn mt-4">Inquiry on WhatsApp</a></div></article>`;
      }).join("");
    }

    async function init() {
      if (!entityId && !slug) {
        await loadCompanySettings();
        showErrorState("missing");
        return;
      }

      try {
        const coSnap = await getDoc(doc(db, "company_settings", "main"));
        if (coSnap.exists()) renderCompanyBranding(coSnap.data());

        const loaded = await loadCardEntity();
        if (!loaded) { showErrorState("notfound"); return; }

        const { type, entity } = loaded;
        const access = await verifyCardAccess(type, entity);
        if (!access.ok) { showErrorState(access.reason, entity, type); return; }

        const phone = renderProfile(entity, type);
        renderProducts(await loadProducts(type, entity.id), phone);
        showState("card");
      } catch (err) {
        console.error("Card load error:", err);
        await loadCompanySettings();
        showErrorState(err?.code === "permission-denied" ? "permission" : "generic");
      }
    }

    init();
  </script>
