<!-- ═══════════════════════════════════════════════════════════════════
     PAYMENT APPROVE MODAL
═══════════════════════════════════════════════════════════════════ -->
  <div id="modal-payment-approve" class="modal-overlay hidden" role="dialog" aria-modal="true"
       aria-labelledby="payment-approve-title">
    <div class="modal-box" style="max-width:460px">
      <div class="px-6 pt-6 pb-4 border-b border-emerald-50 flex items-start justify-between gap-3">
        <div>
          <h3 id="payment-approve-title" class="text-lg font-semibold text-gray-800">Approve Commission Payment</h3>
          <p class="text-xs text-gray-400 mt-0.5">Enter the bank transaction ID to confirm payout</p>
        </div>
        <button type="button" onclick="window.closePaymentApproveModal()" aria-label="Close"
          class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-100 transition-colors flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form id="payment-approve-form" class="px-6 py-5 space-y-4"
            onsubmit="window.submitPaymentApprove(event)" novalidate>
        <input type="hidden" id="payment-approve-sale-id" value="" />
        <input type="hidden" id="payment-approve-role" value="" />
        <div class="bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3">
          <p class="text-xs font-semibold text-emerald-600 uppercase tracking-wide mb-1">Customer</p>
          <p id="payment-approve-customer" class="text-sm font-semibold text-emerald-900">—</p>
          <p id="payment-approve-role-label" class="text-xs text-emerald-600 mt-1 font-medium">—</p>
          <p id="payment-approve-amount" class="text-sm font-bold text-emerald-800 mt-1">—</p>
        </div>
        <div>
          <label for="payment-approve-txn-id" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
            Transaction ID <span class="text-red-400">*</span>
          </label>
          <input type="text" id="payment-approve-txn-id" class="form-field font-mono"
            placeholder="e.g. UTR / NEFT reference number" autocomplete="off" />
        </div>
      </form>
      <div class="px-6 pb-6 flex items-center justify-end gap-3 border-t border-gray-100 pt-4">
        <button type="button" onclick="window.closePaymentApproveModal()"
          class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">Cancel</button>
        <button type="submit" form="payment-approve-form" id="btn-payment-approve"
          class="btn-approve flex items-center gap-2 px-5 py-2 text-sm !font-medium disabled:opacity-60">
          <svg id="payment-approve-spinner" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          Approve Payment
        </button>
      </div>
    </div>
  </div>


<!-- ═══════════════════════════════════════════════════════════════════
     PAYMENT REJECT MODAL
═══════════════════════════════════════════════════════════════════ -->
  <div id="modal-payment-reject" class="modal-overlay hidden" role="dialog" aria-modal="true"
       aria-labelledby="payment-reject-title">
    <div class="modal-box" style="max-width:460px">
      <div class="px-6 pt-6 pb-4 border-b border-red-50 flex items-start justify-between gap-3">
        <div>
          <h3 id="payment-reject-title" class="text-lg font-semibold text-gray-800">Reject Commission Payment</h3>
          <p class="text-xs text-gray-400 mt-0.5">Provide a reason for rejecting this payout</p>
        </div>
        <button type="button" onclick="window.closePaymentRejectModal()" aria-label="Close"
          class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-100 transition-colors flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form id="payment-reject-form" class="px-6 py-5 space-y-4"
            onsubmit="window.submitPaymentReject(event)" novalidate>
        <input type="hidden" id="payment-reject-sale-id" value="" />
        <input type="hidden" id="payment-reject-role" value="" />
        <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3">
          <p class="text-xs font-semibold text-red-500 uppercase tracking-wide mb-1">Customer</p>
          <p id="payment-reject-customer" class="text-sm font-semibold text-red-900">—</p>
          <p id="payment-reject-role-label" class="text-xs text-red-500 mt-1 font-medium">—</p>
          <p id="payment-reject-amount" class="text-sm font-bold text-red-800 mt-1">—</p>
        </div>
        <div>
          <label for="payment-reject-reason" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
            Rejection Reason <span class="text-red-400">*</span>
          </label>
          <textarea id="payment-reject-reason" rows="3" class="form-field resize-none"
            placeholder="Explain why this payment is being rejected…"></textarea>
        </div>
      </form>
      <div class="px-6 pb-6 flex items-center justify-end gap-3 border-t border-gray-100 pt-4">
        <button type="button" onclick="window.closePaymentRejectModal()"
          class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">Cancel</button>
        <button type="submit" form="payment-reject-form" id="btn-payment-reject"
          class="btn-reject flex items-center gap-2 px-5 py-2 text-sm !font-medium disabled:opacity-60">
          <svg id="payment-reject-spinner" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          Reject Payment
        </button>
      </div>
    </div>
  </div>


<!-- ═══════════════════════════════════════════════════════════════════

  <div id="modal-advisor-approval-action" class="modal-overlay hidden" role="dialog" aria-modal="true"

        <div>
          <h3 id="advisor-approval-modal-title" class="text-lg font-semibold text-gray-800">Advisor Action</h3>

          <svg id="advisor-approval-spinner" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          Submit
        </button>
      </div>
    </div>
  </div>
